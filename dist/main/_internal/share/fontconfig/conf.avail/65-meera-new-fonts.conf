<?xml version='1.0' encoding='UTF-8'?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- SPDX-License-Identifier: MIT -->
<fontconfig>
	<!-- Generic alias this font to sans-serif -->
	<alias>
		<family>RIT Meera New</family>
		<default>
			<family>sans-serif</family>
		</default>
	</alias>

	<!-- For Malayalam sans-serif, prefer this font -->
	<match>
		<test name="lang" compare="contains">
			<string>ml</string>
		</test>
		<test name="family">
			<string>sans-serif</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>RIT Meera New</string>
		</edit>
	</match>
	<!--
	   - For fallback:
	   -   https://fedoraproject.org/wiki/Changes/SetDefaultMonospaceFallbackFont
	  -->
 	<match>
		<test name="lang" compare="contains">
			<string>ml</string>
		</test>
		<test name="family">
			<string>monospace</string>
		</test>
		<edit name="family" mode="prepend">
			<string>RIT Meera New</string>
		</edit>
	</match>
</fontconfig>
